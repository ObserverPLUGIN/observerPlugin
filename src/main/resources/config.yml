tracking:
  interval-ms: 1000

nearby-block:
  enabled: true
  radius: 5
  interval-ms: 1000
  blocks:
    - CHEST
    - DIAMOND_BLOCK
  trigger:
    message: "&eNearby target block detected: &f%block% &7at %world% %x% %y% %z%"
    commands:
      - "say %player% found %block% at %world% %x% %y% %z%"

logs:
  memory-limit: 5000
  query-max-results: 50

web:
  enabled: false
  server-name: "local-server"
  endpoint: "http://localhost:8080/api/logs"
  snapshot-enabled: false
  snapshot-endpoint: "http://localhost:8080/api/player-snapshots"
  snapshot-interval-ms: 1000
  snapshot-radius: 5
  timeout-ms: 2000
